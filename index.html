<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Landing Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a 30%, #ff5733 100%);
            filter: blur(50px);
            z-index: -1;
        }

        header {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .logo {
            width: 40px;
            height: 40px;
            background: #ff5733;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: white;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #ff5733;
        }

        .search button {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .search button:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        main {
            text-align: center;
            margin-top: 150px;
        }

        h1 {
            font-size: 72px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #d1d1d1;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .learn-more {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            background: #ff5733;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
        }

        .learn-more:hover {
            background: #e04e2d;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">O</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
        <div class="search">
            <button>Search</button>
        </div>
    </header>
    <main>
        <h1>LANDING PAGE TEMPLATE</h1>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor<br>
        labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation<br>
        Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia.</p>
        <button class="learn-more">LEARN MORE</button>
    </main>
</body>
</html>
